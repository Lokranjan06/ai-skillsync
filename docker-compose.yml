# ============================================================
# AI SkillSync — Docker Compose
# Development: docker-compose up --build
# Production:  docker-compose -f docker-compose.yml up -d
# ============================================================

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skillsync-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./skillsync.db
      - DEBUG=false
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_MINUTE=60
    volumes:
      - skillsync-data:/app/skillsync.db
      - skillsync-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  skillsync-data:
  skillsync-logs:
